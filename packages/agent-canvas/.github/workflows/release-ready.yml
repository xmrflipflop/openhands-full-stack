name: release ready

on:
  pull_request_target:
    types: [ready_for_review]

jobs:
  release-ready:
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: write
    secrets: inherit
    uses: OpenHands/release-actions/.github/workflows/release-ready.yml@main
    with:
      product-name: Agent Canvas
      slack-channel: '#proj-agent-canvas'
