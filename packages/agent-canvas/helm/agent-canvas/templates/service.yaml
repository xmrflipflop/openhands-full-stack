apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-canvas.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-canvas.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "agent-canvas.selectorLabels" . | nindent 4 }}
---
# Headless service required by the StatefulSet for stable network IDs.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-canvas.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-canvas.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "agent-canvas.selectorLabels" . | nindent 4 }}
